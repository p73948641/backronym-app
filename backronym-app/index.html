<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backronym 生成器</title>
    <style>
      body { font-family: sans-serif; padding: 30px; max-width: 400px; margin: 0 auto; text-align: center; }
      input { width: 100%; padding: 12px; font-size: 16px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
      button { background-color: #4CAF50; color: white; padding: 12px 24px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; }
      button:hover { background-color: #45a049; }
      button:disabled { background-color: #cccccc; cursor: not-allowed; }
      #result-box { margin-top: 25px; padding: 20px; background-color: #f9f9f9; border-radius: 8px; min-height: 50px; font-size: 18px; font-weight: bold; color: #333; }
      .loading { color: #888; font-style: italic; font-weight: normal; }
    </style>
  </head>
  <body>
    <h2>💡 智能詞組生成器</h2>
    <input type="text" id="wordInput" placeholder="輸入英文字母 (例如: SHIELD)" onkeypress="if(event.key === 'Enter') processWord()">
    <button id="submitBtn" onclick="processWord()">確認 (Generate)</button>
    <div id="result-box">等候輸入...</div>

    <script>
      async function processWord() {
        const word = document.getElementById('wordInput').value.trim().toUpperCase();
        if (!word) return;

        const btn = document.getElementById('submitBtn');
        const resultBox = document.getElementById('result-box');

        btn.disabled = true;
        resultBox.innerHTML = '<span class="loading">AI 腦力激盪中... ⏳</span>';

        try {
          const response = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ word: word })
          });
          
          const data = await response.json();
          if (data.result) {
            resultBox.innerHTML = data.result;
          } else {
            resultBox.innerHTML = '<span style="color:red;">' + data.error + '</span>';
          }
        } catch (error) {
          resultBox.innerHTML = '<span style="color:red;">系統發生錯誤，請重試。</span>';
        }
        btn.disabled = false;
      }
    </script>
  </body>
</html>
